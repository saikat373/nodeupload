name: Dev to server

on: 
  push:
    branches: 
      - main

jobs:
  deploy_node:
    runs-on: self-hosted

    steps:
      - name: Test SSH Connection
        run: |
          sshpass -p "${{ secrets.DEV_PASS }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEV_USER }}@${{ secrets.DEV_SERVER }} \
          "echo Connected && pwd && ls -la"
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Test Git access
        run: |
          ssh -T git@github.com || true
        

      - name: Clone and install dependencies
        run: |
          cd /var/www/backend && git clone https://github.com/saikat373/nodeupload.git .
      - name: Check Out Git
        uses: actions/checkout@v4
        
      - name: Reconnect with SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Run node modules
        uses: actions/setup-node@v4
        with:
            node-version: '20'
      - name: Install
        run: |
          cd /var/www/backend && npm install

